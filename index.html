<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的小世界</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入原有字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet">
  <!-- 引入原有Font Awesome线稿图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ========== 全局变量与重置 ========== */
    :root {
      --primary-color: #8b5cf6;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-blur: 16px;
      --dark-footer-bg: #1f2937;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth;
      background: #0f0c29;
    }

    body {
      font-family: 'Noto Serif SC', serif;
      position: relative;
    }

    /* 英文专用字体 */
    .en-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* ========== 噪点纹理覆盖层 ========== */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* ========== particles.js 容器样式 ========== */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* ========== 玻璃拟态通用类 ========== */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
      pointer-events: none;
    }

    /* ========== 动画关键帧 ========== */
    @keyframes auroraFlow {
      0% {
        background-position: 0% 50%;
      }

      25% {
        background-position: 50% 100%;
      }

      50% {
        background-position: 100% 50%;
      }

      75% {
        background-position: 50% 0%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes scaleInSoft {
      0% {
        opacity: 0;
        transform: scale(0.85) translateY(10px);
        filter: blur(10px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
        filter: blur(5px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes floatPulse {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-on-scroll {
      opacity: 0;
      animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    /* ========== 第1部分：Hero开篇区 ========== */
    .hero {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10%;
      gap: 5%;
      position: relative;
      z-index: 2;
      background: linear-gradient(-45deg,
          rgba(15, 12, 41, 0.9),
          rgba(48, 43, 99, 0.85),
          rgba(36, 36, 62, 0.85),
          rgba(102, 126, 234, 0.75),
          rgba(118, 75, 162, 0.75),
          rgba(240, 147, 251, 0.65),
          rgba(79, 172, 254, 0.65),
          rgba(0, 242, 254, 0.55),
          rgba(168, 237, 234, 0.55));
      background-size: 400% 400%;
      animation: auroraFlow 12s ease-in-out infinite;
    }

    .content {
      flex: 1;
      color: #fff;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    .en-title {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 1rem;
      animation: scaleInSoft 0.9s ease-out both;
    }

    .cn-title {
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      line-height: 1.2;
      margin-bottom: 2.5rem;
      animation: scaleInSoft 0.9s ease-out 0.15s both;
    }

    .desc,
    .warm-text {
      font-weight: 600;
      font-size: clamp(1rem, 2.2vw, 1.4rem);
      line-height: 1.8;
      max-width: 600px;
      margin-bottom: 2rem;
      animation: scaleInSoft 0.9s ease-out 0.3s both;
    }

    .warm-text {
      color: #e2e8f0;
      animation-delay: 0.45s;
    }

    .image-wrapper {
      flex: 0 0 40%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      animation: scaleInSoft 0.9s ease-out 0.2s both, floatPulse 6s ease-in-out infinite;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    /* ========== 第2部分：主内容区（4+8非对称网格） ========== */
    .main-body {
      position: relative;
      z-index: 2;
      padding: 6rem 10%;
      display: grid;
      grid-template-columns: 3fr 7fr;
      gap: 3rem;
      align-items: start;
    }

    /* 4列：侧边装饰区 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: sticky;
      top: 2rem;
    }

    .sidebar-card {
      border-radius: 20px;
      padding: 2rem;
    }

    .sidebar-icon {
      font-size: 2.5rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 1rem;
    }

    .sidebar-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .sidebar-desc {
      font-size: 1rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
    }

    /* 视觉锚点 */
    .visual-anchor {
      text-align: center;
      padding: 1.5rem 0;
      margin-bottom: 0.5rem;
    }

    .visual-anchor i {
      font-size: 4.5rem;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255, 255, 255, 0.5);
      opacity: 0.6;
    }

    /* 8列：核心信息区 */
    .core-content {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .main-card {
      border-radius: 24px;
      padding: 2.5rem;
    }

    .main-card .cn-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      margin-bottom: 1.5rem;
      animation: none;
      opacity: 1;
      letter-spacing: 0.1em;
      color: #fff;
    }

    .options-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: opacity 0.5s ease-out;
    }

    .options-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .option-btn {
      padding: 1.4rem 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 600;
      line-height: 1.5;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .option-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .option-btn:hover::before {
      opacity: 1;
    }

    .option-btn:hover {
      border-color: var(--primary-color);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.15);
      background: rgba(255, 255, 255, 0.12);
    }

    .reply-container {
      width: 100%;
      text-align: center;
      opacity: 0;
      transform: scale(0.9) translateY(10px);
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding-top: 1rem;
      display: none;
    }

    .reply-container.show {
      display: block;
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .reply-text {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      line-height: 1.8;
      color: #fff;
    }

    /* ========== 第3部分：30天问答区 ========== */
    .qa-section {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 6rem 10%;
    }

    /* ========== 第4部分：深色页脚 ========== */
    .dark-footer {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 4rem 10%;
      background: var(--dark-footer-bg);
      text-align: center;
    }

    .footer-content {
      max-width: 700px;
      margin: 0 auto;
    }

    .footer-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    .footer-desc {
      font-size: 1.1rem;
      font-weight: 500;
      color: #9ca3af;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .footer-footer-text {
      font-size: 0.9rem;
      color: #6b7280;
      line-height: 1.6;
    }

    /* ========== 响应式适配 ========== */
    @media (max-width: 1024px) {

      .main-body,
      .qa-section {
        grid-template-columns: 1fr;
        padding: 4rem 8%;
      }

      .sidebar {
        position: static;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 1.5rem;
      }

      .sidebar-card {
        flex: 1 1 calc(50% - 1rem);
      }

      .visual-anchor {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        justify-content: center;
        padding: 5%;
        gap: 2rem;
        height: auto;
        min-height: 100vh;
      }

      .image-wrapper {
        width: 85%;
        flex: none;
      }

      .sidebar {
        flex-direction: column;
      }

      .sidebar-card {
        flex: 1 1 100%;
      }

      .mid-breaker,
      .dark-footer,
      .qa-section {
        padding: 4rem 8%;
      }

      .option-btn {
        text-align: center;
        padding: 1.2rem 1.5rem;
      }

      /* 移动端字体微调 */
      .desc,
      .warm-text,
      .sidebar-desc,
      .reply-text {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <!-- 噪点纹理覆盖 -->
  <div class="noise-overlay"></div>

  <!-- particles.js 容器 -->
  <div id="particles-js"></div>

  <!-- 第1部分：Hero开篇 -->
  <div class="hero">
    <div class="content">
      <h1 class="en-title en-text">NiceToMeetYou</h1>
      <h2 class="cn-title">Hi,今日好</h2>
      <p class="desc" id="dynamic-text"></p>
      <p class="warm-text">
        打开这个网页的时候，就当我抱了抱你<br>
        希望你一切都好<br>
        好好吃饭，好好睡觉
      </p>
    </div>
    <div class="image-wrapper">
      <img src="cat.jpg" alt="小猫照片">
    </div>
  </div>

  <!-- 第2部分：主内容区（4+8非对称网格） -->
  <section class="main-body">
    <!-- 4列：侧边装饰区 -->
    <aside class="sidebar">
      <!-- 视觉锚点 -->
      <div class="visual-anchor">
        <i class="fa-regular fa-heart"></i>
      </div>

      <div class="sidebar-card glass-card animate-on-scroll">
        <i class="fa-regular fa-sun sidebar-icon"></i>
        <h3 class="sidebar-title">小开心</h3>
        <p class="sidebar-desc">今天的风很温柔，云也很好看。</p>
      </div>
      <div class="sidebar-card glass-card animate-on-scroll" style="animation-delay: 0.1s;">
        <i class="fa-regular fa-moon sidebar-icon"></i>
        <h3 class="sidebar-title">小放松</h3>
        <p class="sidebar-desc">累了就歇会儿，不用逼自己那么紧。</p>
      </div>
      <div class="sidebar-card glass-card animate-on-scroll" style="animation-delay: 0.2s;">
        <i class="fa-regular fa-heart sidebar-icon"></i>
        <h3 class="sidebar-title">小温暖</h3>
        <p class="sidebar-desc">你值得这世间所有的美好。</p>
      </div>
    </aside>

    <!-- 8列：核心信息区（互动部分） -->
    <div class="core-content" id="interaction">
      <div class="main-card glass-card animate-on-scroll">
        <h3 class="cn-title">今天过得怎么样？</h3>
        <div class="options-container" id="optionsContainer">
          <button class="option-btn animate-on-scroll" data-type="happy" style="animation-delay: 0.1s;">
            <i class="fa-regular fa-face-smile" style="margin-right: 1rem; color: rgba(255,255,255,0.7);"></i>
            如果你今天很开心 / 遇到了好事
          </button>
          <button class="option-btn animate-on-scroll" data-type="chill" style="animation-delay: 0.2s;">
            <i class="fa-regular fa-face-grin" style="margin-right: 1rem; color: rgba(255,255,255,0.7);"></i>
            如果你只是摸鱼随便逛逛
          </button>
          <button class="option-btn animate-on-scroll" data-type="tired" style="animation-delay: 0.3s;">
            <i class="fa-regular fa-face-tired" style="margin-right: 1rem; color: rgba(255,255,255,0.7);"></i>
            如果你现在有点累 / 有点烦
          </button>
          <button class="option-btn animate-on-scroll" data-type="struggle" style="animation-delay: 0.4s;">
            <i class="fa-regular fa-face-frown" style="margin-right: 1rem; color: rgba(255,255,255,0.7);"></i>
            如果你又在跟自己较劲 / 绷着神经
          </button>
        </div>
        <div class="reply-container" id="replyContainer">
          <p class="reply-text" id="replyText"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== 30天问答Mid-Breaker区域 ========== -->
  <section class="qa-section">
    <div class="max-w-3xl mx-auto">
      <!-- 标题区 -->
      <div class="text-center mb-16 animate-on-scroll">
        <span class="text-sm font-bold text-purple-300 tracking-widest uppercase">Our Memory Book</span>
        <h2 class="text-3xl md:text-4xl font-bold mt-2 text-white">30 天问答挑战</h2>
        <div class="w-24 h-1 bg-purple-500/50 mx-auto mt-6 rounded-full"></div>
      </div>

      <!-- 问答交互主容器 -->
      <div id="app-container" class="space-y-8">
        <div class="text-center py-10 glass-card rounded-3xl">
          <i class="fa-solid fa-spinner fa-spin text-3xl text-purple-300"></i>
          <p class="mt-4 text-gray-300">正在加载我们的回忆...</p>
        </div>
      </div>
    </div>
  </section>

  <!-- 第4部分：深色页脚 -->
  <footer class="dark-footer">
    <div class="footer-content">
      <h3 class="footer-title">想对你说</h3>
      <p class="footer-desc">不管今天过得如何，都要记得好好照顾自己。你很重要，你的感受也很重要。</p>
      <p class="footer-footer-text" id="footerText"></p>
    </div>
  </footer>

  <!-- 内嵌 particles.js 代码 -->

  <!-- 引入Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- JavaScript：原有功能 + 粒子初始化 -->
  <script>
    window.onload = function () {
      // 1. 初始化粒子效果
      particlesJS('particles-js', {
        "particles": {
          "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
          "color": { "value": "#ffffff" },
          "shape": { "type": "circle" },
          "opacity": { "value": 0.5 },
          "size": { "value": 3, "random": true },
          "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1 },
          "move": { "enable": true, "speed": 2 }
        },
        "interactivity": {
          "events": {
            "onhover": { "enable": true, "mode": "grab" },
            "onclick": { "enable": true, "mode": "push" }
          }
        }
      });

      // 2. 动态时间与生日判断
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const date = now.getDate();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');

      let textContent = `现在是${year}年${month}月${date}日 ${hours}:${minutes}`;
      if (month === 3 && date === 11) {
        textContent += " 生日快乐！";
      }
      document.getElementById('dynamic-text').innerText = textContent;

      // 3. 初始化底部随机小字
      initFooterText();

      // 4. 初始化滚动动画观察器
      initScrollAnimations();

      // 新增：30天问答功能初始化
      initLoveQuestion();
    };

    const footerTexts = [
      "下次来的时候，可以跟我说说你最近的小事",
      "要是有什么想让我加在这里的，随时跟我说",
      "对了，要是你刚好是生日当天点开的，那额外祝你：生日快乐，新的一岁，也平平安安，开开心心。"
    ];

    function initFooterText() {
      const randomIndex = Math.floor(Math.random() * footerTexts.length);
      document.getElementById('footerText').innerText = footerTexts[randomIndex];
    }

    const replies = {
      happy: [
        "太棒啦！快说说遇到什么有意思的事了",
        "今天的开心要多存一点，留着慢慢用",
        "真好，你开心的话，我也跟着开心"
      ],
      chill: [
        "今天有没有喝到好喝的奶茶？",
        "摸鱼快乐！小心别被人抓到啦",
        "要是没什么事，就多陪我待一会儿呗"
      ],
      tired: [
        "不想做的事就先放放，不是必须今天做完",
        "要是不开心，可以和我说说，不用担心打扰",
        "休息一会儿吧，你已经做得够多了"
      ],
      struggle: [
        "不用事事都做到完美，不完美也没关系",
        "不管做的正确与否，你的行为都是很可爱的小事",
        "说不出话也没关系，好好缓缓放空"
      ]
    };

    // 滚动入场动画初始化
    function initScrollAnimations() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
          if (entry.isIntersecting) {
            const delay = entry.target.style.animationDelay || '0s';
            entry.target.style.animationDelay = delay;
            entry.target.classList.add('animate-on-scroll');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.animate-on-scroll, .sidebar-card, .main-card, .option-btn').forEach(el => {
        observer.observe(el);
      });
    }

    // 按钮点击交互
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        const type = this.getAttribute('data-type');
        const optionsContainer = document.getElementById('optionsContainer');
        const replyContainer = document.getElementById('replyContainer');
        const replyText = document.getElementById('replyText');

        // 按钮淡出（不改变高度）
        optionsContainer.classList.add('fade-out');

        const replyList = replies[type];
        const randomReply = replyList[Math.floor(Math.random() * replyList.length)];
        replyText.innerText = randomReply;

        // 淡入回答
        setTimeout(() => {
          replyContainer.classList.add('show');
        }, 300);
      });
    });
  </script>
  <!-- 新增：30天问答核心JS逻辑 -->
  <script>
    // ===================== 请在这里替换你的Supabase信息 =====================
    const SUPABASE_URL = 'https://eivwhgpkyphfzjapgfdc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdndoZ3BreXBoZnpqYXBnZmRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTU0MzUsImV4cCI6MjA4OTY3MTQzNX0.8otyiF17PAfikEuK68ioMKG8lHBYLlHvpkPYwj9ViZE';
    // ========================================================================

    // 修复1: 修改变量名，避免与全局的 supabase 冲突
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 30天问题列表
    const questions = [
      "确认关系的瞬间想的是什么",
      "一起做过的印象最深的一件事",
      "梦见过对方吗，梦里是什么情况",
      "两个人在一起的时候最快乐的一件事",
      "上一次和对方表达喜欢是什么时候",
      "上一次因为对方而哭是什么原因",
      "最喜欢一起做什么事",
      "对方身上最吸引你的某一个特质或者特点",
      "对方做的让你印象最深的一件事",
      "说说对对方的期待",
      "对方送的最喜欢的礼物",
      "是因为什么契机认识对方的",
      "对方做过什么感动到你的事情吗",
      "悄悄写一封情书，回忆结束的时候给对方看",
      "最喜欢对方的一点",
      "觉得对方身上需要改进的地方",
      "最想和对方一起做什么事",
      "向对方表白一下吧",
      "在一起的时候发生的最好玩的事",
      "如果要哄你用什么方法最好呢",
      "两人之间相处方式是什么样的",
      "用一个动物来形容对方",
      "用一个动物来形容自己",
      "给对方的昵称是什么",
      "最喜欢对方叫自己什么",
      "最喜欢对方做什么",
      "最喜欢用什么姿势拥抱",
      "亲吻的时候会发生什么",
      "列举一下对方的优点",
      "恭喜你们又一起走过了一个月，有什么想和对方说的吗"
    ];

    // 全局变量
    let allAnswers = [];
    let currentUnlockedDay = 1;

    // 从Supabase加载所有回答 (修复2: 函数内统一使用 _supabase)
    async function loadAnswers() {
      console.log("正在查询 Supabase...");
      const { data, error } = await _supabase
        .from('answers')
        .select('*')
        .order('day', { ascending: true })
        .order('created_at', { ascending: true });

      if (error) {
        console.error("Supabase 查询错误:", error);
        throw error;
      }

      console.log("查到数据:", data);
      allAnswers = data || [];
      calculateCurrentDay();
    }

    // 计算当前解锁的天数
    function calculateCurrentDay() {
      for (let day = 1; day <= 30; day++) {
        const answersForDay = allAnswers.filter(a => a.day === day);
        const hasA = answersForDay.some(a => a.person === 'A');
        const hasB = answersForDay.some(a => a.person === 'B');

        if (hasA && hasB) {
          continue;
        } else {
          currentUnlockedDay = day;
          return;
        }
      }
      currentUnlockedDay = 30;
    }

    // 提交新回答
    async function submitAnswer(day, person, content) {
      if (!content.trim()) return;

      const { error } = await _supabase
        .from('answers')
        .insert([{ day, person, content }]);

      if (!error) {
        await loadAnswers();
        renderApp();
      } else {
        alert("提交失败，请检查网络和Supabase配置");
      }
    }

    // 渲染整个问答界面
    function renderApp() {
      const container = document.getElementById('app-container');
      let html = '';

      // 计算已完成的天数
      const visibleHistoryDays = [];
      for (let d = 1; d <= 30; d++) {
        const ans = allAnswers.filter(a => a.day === d);
        if (ans.some(a => a.person === 'A') && ans.some(a => a.person === 'B')) {
          visibleHistoryDays.push(d);
        }
      }

      // 倒序渲染历史记录
      visibleHistoryDays.reverse().forEach(day => {
        html += renderHistoryCard(day);
      });

      // 渲染当前填写卡片（未全部完成时）
      if (visibleHistoryDays.length < 30) {
        html = renderCurrentCard() + html;
      } else {
        // 全部完成的庆祝卡片
        html = `<div class="text-center p-10 glass-card rounded-3xl mb-8 animate-on-scroll">
            <h3 class="text-2xl font-bold text-white"><i class="fa-solid fa-gift mr-2"></i> 恭喜！</h3>
            <p class="text-gray-200 mt-2">你们完成了全部的 30 天问答，一起创造了独属于你们的回忆。</p>
         </div>` + html;
      }

      container.innerHTML = html;
      bindEvents();

      // 重新初始化新元素的滚动动画
      setTimeout(() => {
        const newElements = container.querySelectorAll('.glass-card, .animate-on-scroll');
        newElements.forEach(el => {
          if (!el.classList.contains('animate-on-scroll')) {
            el.classList.add('animate-on-scroll');
          }
        });
      }, 100);
    }

    // 渲染当前正在进行的卡片
    function renderCurrentCard() {
      const day = currentUnlockedDay;
      const question = questions[day - 1];
      const existingAnswers = allAnswers.filter(a => a.day === day);
      const hasA = existingAnswers.some(a => a.person === 'A');
      const hasB = existingAnswers.some(a => a.person === 'B');

      return `
        <div class="glass-card rounded-3xl overflow-hidden mb-12 transition-all duration-300 hover:shadow-2xl animate-on-scroll">
          <!-- 卡片头部 -->
          <div class="bg-gradient-to-r from-indigo-500/60 to-purple-600/60 p-8 text-white text-center backdrop-blur-sm">
            <div class="inline-block px-4 py-1 bg-white/20 rounded-full text-sm font-medium mb-3">DAY ${day}</div>
            <h3 class="text-2xl md:text-3xl font-bold leading-tight">${question}</h3>
          </div>
          
          <!-- 状态指示器 -->
          <div class="flex justify-center gap-8 py-6 bg-white/5 border-b border-white/10">
            <div class="flex flex-col items-center">
              <div class="w-12 h-12 rounded-full flex items-center justify-center border-2 transition-colors ${hasA ? 'bg-green-100/20 border-green-400 text-green-300' : 'bg-white/5 border-white/20 text-white/40'}">
                <i class="fa-solid fa-user text-xl"></i>
              </div>
              <span class="mt-2 text-sm font-medium ${hasA ? 'text-green-300' : 'text-white/50'}">你 ${hasA ? '已填写' : '等待中'}</span>
            </div>
            <div class="flex flex-col items-center">
              <div class="w-12 h-12 rounded-full flex items-center justify-center border-2 transition-colors ${hasB ? 'bg-blue-100/20 border-blue-400 text-blue-300' : 'bg-white/5 border-white/20 text-white/40'}">
                <i class="fa-solid fa-user text-xl"></i>
              </div>
              <span class="mt-2 text-sm font-medium ${hasB ? 'text-blue-300' : 'text-white/50'}">TA ${hasB ? '已填写' : '等待中'}</span>
            </div>
          </div>

          <!-- 填写区域 -->
          <div class="p-8">
            <div class="flex gap-4 mb-6">
              <button id="btn-person-A" class="person-btn flex-1 py-3 rounded-xl border-2 border-white/20 text-white/70 font-bold transition-all hover:border-purple-400/50 hover:bg-white/10 ${hasA ? 'opacity-50 cursor-not-allowed' : ''}" data-person="A" ${hasA ? 'disabled' : ''}>
                我是 hq
              </button>
              <button id="btn-person-B" class="person-btn flex-1 py-3 rounded-xl border-2 border-white/20 text-white/70 font-bold transition-all hover:border-purple-400/50 hover:bg-white/10 ${hasB ? 'opacity-50 cursor-not-allowed' : ''}" data-person="B" ${hasB ? 'disabled' : ''}>
                我是 cr
              </button>
            </div>
            
            <div id="input-area" class="hidden">
              <textarea id="answer-input" class="w-full h-32 p-4 border border-white/20 bg-white/5 rounded-xl text-white placeholder-white/40 focus:ring-2 focus:ring-purple-500/50 focus:border-transparent outline-none transition-all resize-none backdrop-blur-sm" placeholder="写下你想说的话..."></textarea>
              <button id="submit-btn" class="mt-4 w-full bg-white/10 text-white py-4 rounded-xl font-bold hover:bg-white/20 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg border border-white/10">
                提交
              </button>
            </div>
            
            ${(hasA || hasB) ? `
              <div class="mt-6 space-y-4">
                ${hasA ? `<div class="bg-green-500/10 p-4 rounded-xl border border-green-500/20"><span class="text-xs text-green-300 font-bold uppercase">你 写的</span><p class="text-white/80 mt-1">${existingAnswers.find(a => a.person === 'A').content}</p></div>` : ''}
                ${hasB ? `<div class="bg-blue-500/10 p-4 rounded-xl border border-blue-500/20"><span class="text-xs text-blue-300 font-bold uppercase">TA 写的</span><p class="text-white/80 mt-1">${existingAnswers.find(a => a.person === 'B').content}</p></div>` : ''}
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // 渲染历史记录卡片
    function renderHistoryCard(day) {
      const question = questions[day - 1];
      const answers = allAnswers.filter(a => a.day === day);
      const answerA = answers.find(a => a.person === 'A');
      const answerB = answers.find(a => a.person === 'B');

      return `
        <div class="glass-card rounded-2xl p-6 md:p-8 mb-6 hover:shadow-md transition-shadow animate-on-scroll">
          <div class="flex items-center justify-between mb-4">
            <span class="text-xs font-bold text-white/40 tracking-wider">DAY ${day}</span>
            <i class="fa-solid fa-lock-open text-white/20"></i>
          </div>
          <h4 class="text-lg font-bold text-white mb-6">${question}</h4>
          
          <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white/5 rounded-xl p-5 relative">
              <div class="absolute -top-3 left-4 bg-green-500/70 text-white text-xs px-2 py-0.5 rounded font-bold backdrop-blur-sm">你</div>
              <p class="text-white/70 mt-2 leading-relaxed whitespace-pre-wrap">${answerA ? answerA.content : '...'}</p>
            </div>
            <div class="bg-white/5 rounded-xl p-5 relative">
              <div class="absolute -top-3 left-4 bg-blue-500/70 text-white text-xs px-2 py-0.5 rounded font-bold backdrop-blur-sm">TA</div>
              <p class="text-white/70 mt-2 leading-relaxed whitespace-pre-wrap">${answerB ? answerB.content : '...'}</p>
            </div>
          </div>
        </div>
      `;
    }

    // 绑定按钮点击事件
    function bindEvents() {
      let selectedPerson = null;

      document.querySelectorAll('.person-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          // 视觉选中效果
          document.querySelectorAll('.person-btn').forEach(b => {
            b.classList.remove('border-purple-400', 'bg-purple-500/20', 'text-white');
          });
          e.target.classList.add('border-purple-400', 'bg-purple-500/20', 'text-white');

          selectedPerson = e.target.getAttribute('data-person');
          document.getElementById('input-area').classList.remove('hidden');
        });
      });

      const submitBtn = document.getElementById('submit-btn');
      if (submitBtn) {
        submitBtn.addEventListener('click', () => {
          const input = document.getElementById('answer-input');
          if (selectedPerson && input.value) {
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 发送中...';
            submitBtn.disabled = true;
            submitAnswer(currentUnlockedDay, selectedPerson, input.value);
          }
        });
      }
    }

    // 修改后的初始化函数，挂载到 window 确保全局可访问
    window.initLoveQuestion = async function () {
      try {
        console.log("开始加载数据...");
        await loadAnswers();
        console.log("数据加载完成，开始渲染");
        renderApp();
      } catch (error) {
        console.error("初始化出错:", error);
        const container = document.getElementById('app-container');
        container.innerHTML = `
          <div class="text-center py-10 text-red-300 glass-card rounded-3xl">
            <i class="fa-solid fa-triangle-exclamation text-4xl mb-4"></i>
            <p>加载失败，请检查网络或数据库配置。</p>
            <p class="text-sm mt-2 text-white/50">错误信息: ${error.message}</p>
            <button onclick="initLoveQuestion()" class="mt-4 px-4 py-2 bg-purple-500/50 text-white rounded-lg border border-white/20">重试</button>
          </div>
        `;
      }
    }
  </script>
</body>

</html>
